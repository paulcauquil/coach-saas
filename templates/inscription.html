{% extends "base.html" %}
{% block title %}Inscription — Tactix{% endblock %}

{% block extra_style %}
<style>
  .auth-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .auth-box { width: 100%; max-width: 440px; }
  .auth-box h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
  .auth-box p.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.6rem; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-box">
    <h1>Créer un compte club</h1>
    <p class="subtitle">Rejoignez Tactix et gérez votre club simplement.</p>

    <div class="card">
      <form method="POST" action="/inscription">
        <div class="form-group">
          <label>Nom du club</label>
          <input type="text" name="nom_club" placeholder="Ex : AS Saint-Étienne" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="contact@monclub.fr" required />
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" name="mot_de_passe" placeholder="••••••••" required minlength="8" />
        </div>

        <div class="row-2">
          <div class="form-group">
            <label>Ville</label>
            <input type="text" name="ville" placeholder="Lyon" required />
          </div>
          <div class="form-group">
            <label>Sport</label>
            <select name="sport" required>
              <option value="" disabled selected>Choisir</option>
              <option value="Football">Football</option>
              <option value="Rugby">Rugby</option>
              <option value="Handball">Handball</option>
              <option value="Basket">Basket</option>
              <option value="Hockey sur glace">Hockey sur glace</option>
              <option value="Volley-ball">Volley-ball</option>
              <option value="Football américain">Football américain</option>
              <option value="Water-polo">Water-polo</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn">Créer mon compte</button>
      </form>
    </div>

    <p class="text-center mt-1 text-muted">
      Déjà inscrit ? <a href="/connexion">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
